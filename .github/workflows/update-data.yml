name: 自動更新 Warframe 資料索引

# 什麼時候觸發這個腳本？
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

# 🌟 關鍵修復：發放寫入權限給機器人，允許它上傳檔案
permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查程式碼 (Checkout repository)
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 🌟 順手升級版本，消滅黃色警告

      - name: 執行資料建構腳本
        run: npm run build

      - name: 自動提交更新的檔案
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自動更新 data_index.json"
          file_pattern: "data_index.json"