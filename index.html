<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe 網狀資源星圖 (方案4 概念驗證)</title>
  
  <!-- 引入 Force-Graph 拓撲圖庫 (支援 Canvas 畫布，效能極佳) -->
  <script src="https://unpkg.com/force-graph"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0e14;
      color: #ecf0f1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* 頂部標題與搜尋欄 */
    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      pointer-events: none; /* 讓滑鼠可以穿透點擊後方的星圖 */
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 20px;
      letter-spacing: 1px;
      color: #4fc3f7;
      text-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
    }

    input {
      background: rgba(20, 30, 45, 0.8);
      border: 1px solid #4fc3f7;
      padding: 8px 12px;
      color: #fff;
      border-radius: 4px;
      width: 250px;
      pointer-events: auto; /* 恢復輸入框的點擊事件 */
      outline: none;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* 側邊資訊卡片 */
    #info-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 300px;
      background: rgba(15, 23, 36, 0.9);
      border-left: 4px solid #4fc3f7;
      padding: 15px;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      z-index: 10;
      display: none; /* 預設隱藏，點擊節點後顯示 */
      max-height: 50vh;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 18px;
      color: #fff;
      margin-top: 0;
      border-bottom: 1px solid #34495e;
      padding-bottom: 8px;
    }

    .data-row {
      margin: 8px 0;
      font-size: 13px;
    }

    .data-label {
      color: #7f8c8d;
    }

    /* 載入中動畫 */
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #4fc3f7;
      z-index: 5;
    }
  </style>
</head>
<body>

  <div id="loader">正在直連 wfcd 讀取 Warframe 最新數據...</div>

  <div id="ui-container">
    <h1>WARFRAME 網狀資源星圖</h1>
    <input type="text" id="search-input" placeholder="輸入關鍵字搜尋（如：Braton）...">
  </div>

  <div id="info-panel">
    <h2 class="panel-title" id="item-name">武器名稱</h2>
    <div class="data-row"><span class="data-label">類型：</span><span id="item-type">-</span></div>
    <div class="data-row"><span class="data-label">段位限制：</span><span id="item-mr">-</span></div>
    <div class="data-row"><span class="data-label">敘述：</span><span id="item-desc">-</span></div>
  </div>

  <!-- 星圖渲染容器 -->
  <div id="graph"></div>

  <script>
    // 1. 直連 wfcd 放在 GitHub Pages CDN 上的真實主要武器 JSON 資料
    const WFCD_URL = 'https://raw.githubusercontent.com/wfcd/warframe-items/master/data/json/Primary.json';

    fetch(WFCD_URL)
      .then(res => res.json())
      .then(rawData => {
        document.getElementById('loader').style.display = 'none';

        // 2. 解析 JSON，把 wfcd 的資料結構，轉換成圖表庫看得懂的「節點(Nodes)」與「連線(Links)」
        const nodes = [];
        const links = [];
        const nodeSet = new Set(); // 避免重複加入節點

        // 為了讓 CodePen 跑得順畅，我們只拿前 120 筆資料來織網（wfcd 總共有數千筆）
        const slicedData = rawData.slice(0, 120);

        slicedData.forEach(item => {
          // A. 建立武器本體節點
          if (!nodeSet.has(item.uniqueName)) {
            nodes.push({
              id: item.uniqueName,
              name: item.name,
              type: 'weapon',
              mr: item.masteryReq || 0,
              description: item.description || '暫無敘述'
            });
            nodeSet.add(item.uniqueName);
          }

          // B. 建立「部件/關聯」節點。如果這把武器有不同的變體（例如 Prime, Wraith, Kuva）
          // 我們就讓變體武器連線到原版武器，織出網狀關係
          if (item.name.includes('Prime') || item.name.includes('Wraith') || item.name.includes('Kuva') || item.name.includes('Prisma')) {
            // 尋找名字裡不帶變體詞的原版武器作為「核心母節點」
            const baseName = item.name.replace(' Prime', '').replace(' Wraith', '').replace(' Kuva ', '').replace(' Prisma ', '');
            const baseItem = slicedData.find(i => i.name === baseName);
            
            if (baseItem) {
              links.push({
                source: item.uniqueName,
                target: baseItem.uniqueName,
                val: 2 // 連線粗細
              });
            }
          }
          
          // C. 如果武器有特定掉落物或派系標籤（這裡拿傳奇/一般來當分類節點示範）
          const groupTag = item.productCategory || 'Primary';
          if (!nodeSet.has(groupTag)) {
            nodes.push({ id: groupTag, name: '【類別】' + groupTag, type: 'group' });
            nodeSet.add(groupTag);
          }
          links.push({ source: item.uniqueName, target: groupTag, val: 1 });
        });

        const graphData = { nodes, links };

        // 3. 初始化 Force-Graph 圖表庫
        const Graph = ForceGraph()(document.getElementById('graph'))
          .graphData(graphData)
          .nodeId('id')
          .nodeLabel('name') // 滑鼠移上去時顯示的名字
          .nodeAutoColorBy('type') // 根據節點類型自動上色
          .linkWidth(link => link.val)
          .linkColor(() => 'rgba(255,255,255,0.15)') // 線條顏色
          .onNodeClick(node => {
            // 4. 點擊節點的互動邏輯：平移視角 + 彈出右下角資訊卡片
            Graph.centerAt(node.x, node.y, 1000);
            Graph.zoom(2.5, 1000);

            if(node.type === 'weapon') {
              document.getElementById('item-name').innerText = node.name;
              document.getElementById('item-type').innerText = '主要武器';
              document.getElementById('item-mr').innerText = node.mr + ' 段';
              document.getElementById('item-desc').innerText = node.description;
              document.getElementById('info-panel').style.display = 'block';
            } else {
              document.getElementById('info-panel').style.display = 'none';
            }
          });

        // 自訂節點外觀：讓文字直接顯示在圓圈旁邊，更有科技感
        Graph.nodeCanvasObject((node, ctx, globalScale) => {
          const label = node.name;
          const fontSize = node.type === 'group' ? 16 / globalScale : 12 / globalScale;
          ctx.font = `${fontSize}px Sans-Serif`;
          
          // 畫圓圈節點
          const r = node.type === 'group' ? 8 : 4;
          ctx.beginPath();
          ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
          ctx.fillStyle = node.color;
          ctx.fill();

          // 畫文字標籤
          ctx.fillStyle = node.type === 'group' ? '#4fc3f7' : '#bdc3c7';
          ctx.fillText(label, node.x + r + 2, node.y + 3);
        });

        // 5. 搜尋功能連動
        document.getElementById('search-input').addEventListener('input', e => {
          const value = e.target.value.toLowerCase();
          const targetNode = graphData.nodes.find(n => n.name.toLowerCase().includes(value));
          if (targetNode && value.length > 1) {
            Graph.centerAt(targetNode.x, targetNode.y, 800);
            Graph.zoom(3, 800);
          }
        });

      })
      .catch(err => {
        document.getElementById('loader').innerText = '資料讀取失敗，請檢查網路連線。';
        console.error(err);
      });
  </script>
</body>
</html>
