<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Warframe 秘典大廳</title>
  <style>
    body { 
      background-color: #0c0e12; 
      color: #fdfbf7; 
      font-family: sans-serif; 
      margin: 0; 
      padding: 40px 20px; 
    }
    h1 { 
      text-align: center; 
      color: #d4af37; 
      letter-spacing: 4px; 
      font-size: 2em;
      margin-bottom: 40px;
    }
    #grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
      gap: 25px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    .card { 
      background: rgba(255,255,255,0.03); 
      border: 1px solid #c5a059; 
      border-radius: 8px; 
      padding: 20px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .card:hover { 
      background: rgba(212, 175, 55, 0.15); 
      transform: translateY(-8px); 
      box-shadow: 0 8px 20px rgba(212,175,55,0.4); 
      border-color: #ffdf73;
    }
    .card img { 
      max-width: 120px; 
      height: 120px; 
      object-fit: contain;
      margin-bottom: 15px; 
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
    }
    .card-title { 
      color: #ffdf73; 
      font-weight: bold; 
      font-size: 1.2em; 
      letter-spacing: 1px;
    }
    .card-subtitle {
      font-size: 0.85em; 
      color: #a0aec0; 
      margin-top: 8px;
    }
    #loader {
      text-align: center; 
      color: #38bdf8;
      font-size: 1.2em;
      letter-spacing: 2px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <h1>WARFRAME 秘典終端機</h1>
  <div id="loader">正在從中樞系統載入戰甲資料...</div>
  <div id="grid"></div>

  <script>
    const URL_WARFRAMES = 'https://raw.githubusercontent.com/wfcd/warframe-items/master/data/json/Warframes.json';
    const URL_I18N = 'https://raw.githubusercontent.com/wfcd/warframe-items/master/data/json/i18n.json';

    Promise.all([
      fetch(URL_WARFRAMES).then(res => res.json()),
      fetch(URL_I18N).then(res => res.json())
    ]).then(([warframes, i18nData]) => {
      document.getElementById('loader').style.display = 'none';
      const grid = document.getElementById('grid');

      // 建立翻譯字典 (保留你的繁中堅持！)
      const i18nNameMap = {};
      Object.keys(i18nData).forEach(key => {
        if (i18nData[key].en && i18nData[key].en.name) {
          i18nNameMap[i18nData[key].en.name.toLowerCase()] = i18nData[key];
          i18nNameMap[i18nData[key].en.name.replace(/\s+/g, '').toLowerCase()] = i18nData[key];
        }
      });

      // 過濾出真正的戰甲 (排除雜兵、開發者測試用代碼)
      const validFrames = warframes.filter(w => w.productCategory === 'Suits' && !w.name.includes('Dev '));

      validFrames.forEach(wf => {
        let tcName = wf.name;
        
        // 抓翻譯
        let match = i18nData[wf.uniqueName] || i18nData[wf.itemUniqueName] || i18nNameMap[wf.name.toLowerCase()];
        if (match) {
          const trans = match.tc || match['zh-hant'] || match.zh || {};
          tcName = trans.name || tcName;
        }

        const card = document.createElement('div');
        card.className = 'card';
        // 🌟 核心：點擊後帶著名字跳轉到詳細頁面！
        card.onclick = () => window.location.href = `detail.html?frame=${encodeURIComponent(wf.name)}`;
        
        const imgUrl = wf.imageName ? `https://cdn.warframestat.us/img/${wf.imageName}` : '';
        
        card.innerHTML = `
          ${imgUrl ? `<img src="${imgUrl}" alt="${wf.name}" onerror="this.style.display='none'">` : ''}
          <div class="card-title">${tcName}</div>
          <div class="card-subtitle">${wf.name}</div>
        `;
        grid.appendChild(card);
      });
    }).catch(err => {
      document.getElementById('loader').innerText = '載入失敗，請檢查網路連線。';
    });
  </script>
</body>
</html>
