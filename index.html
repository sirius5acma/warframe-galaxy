<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe 戰甲星系製造網</title>
  
  <!-- 引入 Force-Graph 拓撲圖庫 -->
  <script src="https://unpkg.com/force-graph"></script>
  
  <!-- 🌟 引入我們獨立出來的 CSS 檔案 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loader">正在直連 wfcd 讀取天之刃最新戰甲數據庫...</div>

  <div id="ui-container">
    <h1>WARFRAME 戰甲星系製造網</h1>
    <div class="subtitle">點擊星體聚焦觀看部件關係網</div>
    <div style="position: relative;">
      <input type="text" id="search-input" placeholder="搜尋（例如：Excalibur 或 Wisp）...">
      <div id="search-results"></div>
    </div>
  </div>

  <div id="info-panel">
    <h2 class="panel-title" id="item-name">戰甲名稱</h2>
    <div id="item-unique" class="panel-unique">uniqueName</div>
    <div class="data-row"><span class="data-label">類型：</span><span class="data-val" id="item-type">-</span></div>
    <div class="data-row"><span class="data-label">段位限制：</span><span class="data-val" id="item-mr">-</span></div>
    <div class="data-row"><span class="data-label">健康 / 護甲 / 護盾：</span><br><span class="data-val" id="item-stats">-</span></div>
    <div class="data-row"><span class="data-label">簡介：</span><br><span class="data-val" id="item-desc" style="color:#cbd5e1; font-size:13px;">-</span></div>
  </div>

  <div id="graph"></div>

  <!-- 🌟 引入我們獨立出來的 JS 檔案 (加上 defer 確保網頁載入後才執行邏輯) -->
  <script src="app.js" defer></script>
</body>
</html>
