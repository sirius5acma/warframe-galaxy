<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warframe 裝備圖鑑</title>
  <script src="https://cdn.jsdelivr.net/npm/force-graph"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      /* 虛空深淵底色 */
      background-color: #07080a;
      background-image: radial-gradient(circle at 50% 0%, #12151c 0%, #07080a 80%);
      color: #fdfbf7;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #07080a; }
    ::-webkit-scrollbar-thumb { background: #c5a059; }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* 🌟 結合 A 的斜切角 + B 的半透明深色底 */
    .profile-section, .graph-section {
      display: flex;
      flex-direction: column;
      background-color: rgba(12, 14, 18, 0.9);
      padding: 40px;
      /* A 的魔法：切角 */
      clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
      /* 因為 clip-path 會切掉邊框，我們改用內陰影營造金色質感 */
      box-shadow: inset 0 0 20px rgba(197, 160, 89, 0.1);
    }

    .profile-section { align-items: center; }

    #wf-image {
      max-width: 300px;
      height: auto;
      object-fit: contain;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 25px rgba(255, 223, 115, 0.25));
    }

    /* 🌟 結合 A 的大寫字距 + B 的金色漸層 */
    #item-name {
      font-size: 3.5rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 6px;
      background: linear-gradient(to bottom, #fff7db 0%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 5px 0;
      filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
    }

    #item-subtitle {
      font-size: 0.95rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a69062;
      margin: 0 0 30px 0;
    }

    .badge-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }

    .badge {
      background-color: rgba(197, 160, 89, 0.05);
      /* 保留切角 */
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      padding: 6px 15px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffdf73;
      border-left: 2px solid #c5a059; /* 用單邊線條代替全邊框 */
      border-right: 2px solid #c5a059;
    }

    #item-desc {
      line-height: 1.9;
      color: #d1cbbd;
      font-size: 1.05rem;
      text-align: center;
      width: 100%;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .section-title, .graph-title {
      width: 100%;
      font-size: 1.1rem;
      color: #fdfbf7;
      margin: 20px 0 15px 0;
      padding-left: 15px;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 400;
      border-left: 3px solid #d4af37; /* B的顏色 + A的排版 */
    }

    /* 🌟 數據方塊：斜切角 + 金色高光 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      width: 100%;
      margin-bottom: 40px;
    }

    .stat-card {
      background-color: rgba(255, 255, 255, 0.02);
      padding: 20px 10px;
      text-align: center;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      border-left: 2px solid rgba(197, 160, 89, 0.5);
      transition: all 0.3s ease;
    }
    
    .stat-card:hover {
      background-color: rgba(212, 175, 55, 0.08);
      border-left-color: #d4af37;
    }

    .stat-title {
      font-size: 0.75rem;
      color: #a69062;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 300;
      color: #fdfbf7;
    }

    /* 🌟 技能列表 */
    .abilities-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 40px;
    }

    .ability-card {
      display: flex;
      gap: 20px;
      background-color: rgba(255, 255, 255, 0.02);
      padding: 20px;
      align-items: center;
      clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
      border-left: 2px solid transparent;
      transition: 0.3s;
    }
    
    .ability-card:hover {
      background-color: rgba(212, 175, 55, 0.05);
      border-left: 2px solid #d4af37;
    }

    .ability-icon { 
      width: 50px; height: 50px; opacity: 0.95; 
      filter: drop-shadow(0 0 6px rgba(255, 223, 115, 0.4)); 
    }
    .ability-icon-placeholder {
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      background-color: rgba(212, 175, 55, 0.05);
      color: #ffdf73; font-size: 0.85rem; letter-spacing: 1px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .ability-info { display: flex; flex-direction: column; gap: 6px; text-align: left; flex: 1; }
    .ability-name { color: #ffdf73; font-weight: 400; font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase;}
    .ability-desc { color: #d1cbbd; line-height: 1.7; font-size: 0.95rem; font-weight: 300; }

    /* 折疊面板 */
    .accordion-container { width: 100%; display: flex; flex-direction: column; gap: 5px; }

    .accordion {
      background-color: rgba(255, 255, 255, 0.03);
      color: #fdfbf7;
      cursor: pointer;
      padding: 18px 25px;
      width: 100%;
      text-align: left;
      border: none;
      border-left: 2px solid rgba(197, 160, 89, 0.3);
      outline: none;
      transition: 0.3s;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
    }
    
    .accordion:hover, .accordion.active { 
      background-color: rgba(212, 175, 55, 0.08); 
      border-left-color: #d4af37; 
    }
    .accordion::after { content: '+'; font-size: 1.5rem; color: #c5a059; font-weight: 300; }
    .accordion.active::after { content: '−'; }

    .panel {
      padding: 0 25px;
      background-color: transparent;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      color: #d1cbbd;
      font-weight: 300;
      line-height: 1.9;
    }
    .panel-content { padding: 20px 0; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }

    /* 圖表容器 */
    #graph-container {
      width: 100%;
      height: 600px;
      position: relative;
      background-color: #050608;
      clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
      box-shadow: inset 0 0 40px rgba(197, 160, 89, 0.05);
    }

    #loader {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #c5a059; text-transform: uppercase; letter-spacing: 3px; font-weight: 300;
    }

    /* 縮放控制器 */
    #zoom-controls {
      position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
    }
    #zoom-controls button {
      width: 40px; height: 40px;
      background-color: rgba(12, 14, 18, 0.8);
      color: #c5a059;
      border: none;
      border-left: 2px solid rgba(197, 160, 89, 0.3);
      font-size: 1.5rem; font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
      clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    }
    #zoom-controls button:hover { 
      background-color: rgba(212, 175, 55, 0.15); 
      border-left-color: #d4af37; 
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="profile-section">
      <img id="wf-image" src="" alt="Warframe Image" style="display: none;">
      <h1 id="item-name">載入中...</h1>
      <p id="item-subtitle">讀取星系資料庫...</p>
      
      <div class="badge-container">
        <span class="badge" id="item-type">類型</span>
        <span class="badge" id="item-mr">段位限制</span>
      </div>

      <div id="item-desc">請稍候...</div>

      <div class="section-title">🟢 基礎體質</div>
      <div class="stats-grid" id="stats-grid">
        </div>

      <div class="section-title">✨ 戰甲技能</div>
      <div class="abilities-list" id="abilities-list">
        </div>

      <div class="accordion-container">
        <button class="accordion">🔴 進階配卡 (Modding)</button>
        <div class="panel">
          <div class="panel-content" id="panel-advanced">讀取中...</div>
        </div>

        <button class="accordion">🛠️ 鑄造與背景 (Crafting & Lore)</button>
        <div class="panel">
          <div class="panel-content" id="panel-crafting">讀取中...</div>
        </div>
      </div>
    </div>

    <!-- 關聯配方圖 -->
    <div class="graph-section">
      <h2 class="graph-title">製造配方關聯圖</h2> <!-- 👈 標題在這裡 -->
      <div id="graph-container">
        <div id="loader">正在建構配方圖...</div>
        <div id="zoom-controls">
          <button id="zoom-in">+</button>
          <button id="zoom-out">−</button>
        </div>
        <div id="graph"></div>
      </div>
    </div>

  <script src="app.js"></script>
  
</body>
</html>
