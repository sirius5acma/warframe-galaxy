<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Warframe 星圖檢索系統</title>
  <!-- 🌟 引入外觀設定 -->
  <link rel="stylesheet" href="starchart.css">
</head>
<body>

  <div class="top-bar">
    <div class="back-btn" id="backBtn" onclick="handleBack()">&#8592; 返回樞紐</div>
    <h1>WARFRAME 星圖檢索系統</h1>
    <div id="sub-title">一般星圖</div>
    <div class="search-container" id="searchBoxContainer">
      <input type="text" id="searchInput" placeholder="搜尋星球、節點名稱或任務類型..." autocomplete="off">
    </div>
  </div>

  <div id="loader">正在連線至中樞系統載入星圖...</div>
  
  <!-- 第一層：主星圖 -->
  <div id="grid"></div>

  <!-- 第二層：星球專屬大頁面 (預設隱藏) -->
  <div id="planet-detail-view">
    <div class="planet-header">
      <img id="detail-img" src="" alt="星球圖片" onerror="this.style.display='none'">
      <div class="planet-header-text">
        <h2 id="detail-name-tc">星球名稱</h2>
        <p id="detail-name-en">Planet Name</p>
      </div>
    </div>

    <!-- 掉落物區塊 -->
    <div class="drops-section">
      <div class="drops-title">💎 本星域常規特產資源</div>
      <div class="drops-grid" id="detail-drops">
        <!-- JS 會把資料塞在這裡 -->
      </div>
    </div>

    <div class="nodes-section-title">任務節點清單 (<span id="detail-node-count">0</span>)</div>
    
    <!-- 節點資料動態插入在這裡 -->
    <div class="nodes-grid" id="detail-nodes"></div>
  </div>

  <!-- 🌟 先引入翻譯檔，再引入核心大腦 -->
  <script src="translations.js"></script>
  <script src="starchart.js"></script>

</body>
</html>
