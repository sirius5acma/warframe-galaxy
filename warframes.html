<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Warframe 秘典大廳</title>
  <style>
    body { 
      background-color: #0c0e12; 
      color: #fdfbf7; 
      font-family: sans-serif; 
      margin: 0; 
      padding: 40px 20px; 
    }

    /* 🌟 這裡就是我們剛剛學的返回按鈕 CSS */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(12,14,18,0.9);
      border: 1px solid #c5a059;
      color: #ffdf73;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 9999;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.8);
      transition: all 0.3s ease;
    }
    .back-btn:hover {
      background: rgba(212,175,55,0.2);
      transform: translateX(-3px);
    }

    h1 { 
      text-align: center; 
      color: #d4af37; 
      letter-spacing: 4px; 
      font-size: 2em;
      margin-bottom: 20px;
      margin-top: 30px; /* 稍微往下推一點，避免跟返回按鈕太擠 */
    }
    
    .controls {
      max-width: 1200px;
      margin: 0 auto 40px auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    
    .search-container {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    #searchInput {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #c5a059;
      border-radius: 25px;
      color: #fdfbf7;
      font-size: 1.1em;
      outline: none;
      transition: all 0.3s;
    }
    #searchInput:focus {
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
      border-radius: 15px 15px 0 0;
    }

    .suggestions-box {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #0c0e12;
      border: 1px solid #c5a059;
      border-top: none;
      border-radius: 0 0 15px 15px;
      z-index: 1000;
      display: none;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.8);
    }
    .suggestion-item {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .suggestion-item:hover {
      background: rgba(212,175,55,0.2);
      color: #ffdf73;
    }

    .filters {
      display: flex;
      gap: 10px;
    }
    .filter-btn {
      background: rgba(12,14,18,0.8);
      border: 1px solid #c5a059;
      color: #c5a059;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }
    .filter-btn:hover {
      background: rgba(212,175,55,0.1);
    }
    .filter-btn.active {
      background: #c5a059;
      color: #0c0e12;
    }

    #grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
      gap: 25px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    .card { 
      background: rgba(255,255,255,0.03); 
      border: 1px solid #c5a059; 
      border-radius: 8px; 
      padding: 20px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .card:hover { 
      background: rgba(212, 175, 55, 0.15); 
      transform: translateY(-8px); 
      box-shadow: 0 8px 20px rgba(212,175,55,0.4); 
      border-color: #ffdf73;
    }
    .card img { 
      max-width: 120px; 
      height: 120px; 
      object-fit: contain;
      margin-bottom: 15px; 
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
    }
    .card-title { 
      color: #ffdf73; 
      font-weight: bold; 
      font-size: 1.2em; 
      letter-spacing: 1px;
    }
    .card-subtitle {
      font-size: 0.85em; 
      color: #a0aec0; 
      margin-top: 8px;
    }
    #loader {
      text-align: center; 
      color: #38bdf8;
      font-size: 1.2em;
      letter-spacing: 2px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  
  <!-- 🌟 這裡就是我們剛剛學的返回按鈕 HTML -->
  <div class="back-btn" onclick="window.location.href='index.html'">&#8592; 返回首頁</div>

  <h1>WARFRAME 秘典終端機</h1>
  
  <div class="controls" id="controls" style="display: none;">
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="搜尋戰甲名稱 (支援中英文)..." autocomplete="off">
      <div id="suggestionsBox" class="suggestions-box"></div>
    </div>
    
    <div class="filters">
      <button class="filter-btn active" data-type="all">全部戰甲</button>
      <button class="filter-btn" data-type="prime">Prime 系列</button>
      <button class="filter-btn" data-type="normal">普版系列</button>
    </div>
  </div>

  <div id="loader">正在從中樞系統載入戰甲資料...</div>
  <div id="grid"></div>

  <script>
    const URL_WARFRAMES = 'https://raw.githubusercontent.com/wfcd/warframe-items/master/data/json/Warframes.json';
    const URL_I18N = 'https://raw.githubusercontent.com/wfcd/warframe-items/master/data/json/i18n.json';

    let allFramesData = []; 
    let currentFilterType = 'all';

    async function fetchWithCache(url) {
      const cache = await caches.open('warframe-data-cache-v1');
      const cachedResponse = await cache.match(url);
      
      if (cachedResponse) {
        return cachedResponse.json();
      }
      
      const response = await fetch(url);
      if (response.ok) {
        cache.put(url, response.clone());
        return response.json();
      }
      throw new Error(`網路請求失敗: ${response.status}`);
    }

    Promise.all([
      fetchWithCache(URL_WARFRAMES),
      fetchWithCache(URL_I18N)
    ]).then(([warframes, i18nData]) => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('controls').style.display = 'flex';

      const i18nNameMap = {};
      Object.keys(i18nData).forEach(key => {
        if (i18nData[key].en && i18nData[key].en.name) {
          i18nNameMap[i18nData[key].en.name.toLowerCase()] = i18nData[key];
          i18nNameMap[i18nData[key].en.name.replace(/\s+/g, '').toLowerCase()] = i18nData[key];
        }
      });

      const validFrames = warframes.filter(w => w.productCategory === 'Suits' && !w.name.includes('Dev '));

      allFramesData = validFrames.map(wf => {
        let tcName = wf.name;
        let match = i18nData[wf.uniqueName] || i18nData[wf.itemUniqueName] || i18nNameMap[wf.name.toLowerCase()];
        if (match) {
          const trans = match.tc || match['zh-hant'] || match.zh || {};
          tcName = trans.name || tcName;
        }
        wf.tcName = tcName;
        wf.isPrime = wf.name.includes('Prime');
        return wf;
      });

      renderGrid(allFramesData);
    }).catch(err => {
      console.error(err);
      document.getElementById('loader').innerText = '載入失敗，請檢查網路連線。';
    });

    function renderGrid(framesToRender) {
      const grid = document.getElementById('grid');
      grid.innerHTML = ''; 
      
      framesToRender.forEach(wf => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => window.location.href = `detail.html?frame=${encodeURIComponent(wf.name)}`;
        
        const imgUrl = wf.imageName ? `https://cdn.warframestat.us/img/${wf.imageName}` : '';
        
        card.innerHTML = `
          ${imgUrl ? `<img src="${imgUrl}" alt="${wf.name}" onerror="this.style.display='none'">` : ''}
          <div class="card-title">${wf.tcName}</div>
          <div class="card-subtitle">${wf.name}</div>
        `;
        grid.appendChild(card);
      });
    }

    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allFramesData.filter(wf => {
        if (currentFilterType === 'prime' && !wf.isPrime) return false;
        if (currentFilterType === 'normal' && wf.isPrime) return false;
        if (searchTerm) {
          const matchEn = wf.name.toLowerCase().includes(searchTerm);
          const matchTc = wf.tcName.toLowerCase().includes(searchTerm);
          if (!matchEn && !matchTc) return false;
        }
        return true;
      });
      renderGrid(filtered);
    }

    const searchInput = document.getElementById('searchInput');
    const suggestionsBox = document.getElementById('suggestionsBox');

    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      applyFilters();

      if (!term) {
        suggestionsBox.style.display = 'none';
        searchInput.style.borderRadius = '25px';
        return;
      }

      let matches = allFramesData.filter(wf => {
        const matchEn = wf.name.toLowerCase().includes(term);
        const matchTc = wf.tcName.toLowerCase().includes(term);
        return matchEn || matchTc;
      });

      matches.sort((a, b) => a.name.localeCompare(b.name));
      matches = matches.slice(0, 5);

      if (matches.length === 0) {
        suggestionsBox.style.display = 'none';
        searchInput.style.borderRadius = '25px';
        return;
      }

      suggestionsBox.innerHTML = '';
      matches.forEach(wf => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `
          <strong style="color: #ffdf73; letter-spacing: 1px;">${wf.tcName}</strong>
          <span style="color: #a0aec0; font-size: 0.85em;">${wf.name}</span>
        `;
        item.onclick = () => window.location.href = `detail.html?frame=${encodeURIComponent(wf.name)}`;
        suggestionsBox.appendChild(item);
      });

      suggestionsBox.style.display = 'block';
      searchInput.style.borderRadius = '15px 15px 0 0';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) {
        suggestionsBox.style.display = 'none';
        searchInput.style.borderRadius = '25px';
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilterType = e.target.getAttribute('data-type');
        applyFilters();
      });
    });
  </script>
</body>
</html>
